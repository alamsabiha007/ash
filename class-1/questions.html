    <script>
        // 1. Print Name

        let num1 = 10, num2 = 5;

        let mul1 = 6, mul2 = 6;

        let div1 = 50, div2 = 5;

        //=== condistional question ===

        // 1. Even or Odd
        let number = 7;
        if (number % 2 === 0){
            console.log(number + "is Even");
        }
         else {
            console.log(number + "is Odd")
         }
         
         // 2. Eligibile for 
         let age = 19
         if (age >= 18){
            console.log("Eligibile to vote");
         } else{
            console.log("Not eligibile to vote");
         }
         
         // 3. Positive or Negitive
         let num = -5
         if (num > 0) {
            console.log("Positive number");
         } else {
            console.log("Negative number");
         }

         // 4. Greater than 100
         let checknum = 120
         if( checknum >= 100) {
            console.log("Greater");
         } else{
            console.log("Smallest");
         }

         // 5.Student PASS or Fail
         let marks = 80
         if (marks >= 70){
            console.log("Passed")
         }
         else {
            console.log("failed")
         }
    </script
