<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Light Green & Black Calculator</title>
    <style>
        /* Base Styling & Background */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222222; /* Dark Gray Background */
        }

        /* Calculator Body */
        .calculator {
            width: 380px;
            background-color: #000000;
            padding: 25px;
            border-radius: 30px;
            border: 2px solid #555555;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* Screen Display */
        .screen {
            width: 100%;
            height: 100px;
            background-color: #000000;
            border-bottom: 2px solid #333333;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 10px 20px;
            margin-bottom: 25px;
        }

        .screen span {
            color: #ffffff;
            font-size: 4.5rem;
            font-weight: 300;
            line-height: 1;
        }

        /* Buttons Grid */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        /* Common Button Styles */
        button {
            height: 65px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: all 0.1s ease;
        }

        /* Light Green Buttons (Top Row & Operators) */
        .btn-green {
            background-color: #32cd32; /* Lime/Light Green */
            color: #1c1c1e;
            border: 2px solid #249d24;
            box-shadow: inset 0px -4px 0px #249d24, 0px 4px 10px rgba(50, 205, 50, 0.2);
        }

        /* Black Buttons with Green Border (Numbers) */
        .btn-black {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #32cd32;
            box-shadow: inset 0px -3px 0px rgba(50, 205, 50, 0.4), 0px 0px 8px rgba(50, 205, 50, 0.2);
        }

        /* Double Column Button (= Sign) */
        .btn-wide {
            grid-column: span 2;
        }

        /* Button Press Effect (3D effect) */
        button:active {
            transform: translateY(3px);
            box-shadow: inset 0px 0px 0px transparent, 0px 1px 2px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="screen">
            <span>0</span>
        </div>

        <div class="buttons-grid">
            <button class="btn-green">AC</button>
            <button class="btn-green">DEL</button>
            <button class="btn-green">%</button>
            <button class="btn-green">+</button>

            <button class="btn-black">7</button>
            <button class="btn-black">8</button>
            <button class="btn-black">9</button>
            <button class="btn-green">-</button>

            <button class="btn-black">4</button>
            <button class="btn-black">5</button>
            <button class="btn-black">6</button>
            <button class="btn-green">&times;</button>

            <button class="btn-black">3</button>
            <button class="btn-black">2</button>
            <button class="btn-black">1</button>
            <button class="btn-green">&divide;</button>

            <button class="btn-black">0</button>
            <button class="btn-black">.</button>
            <button class="btn-green btn-wide">=</button>
        </div>
    </div>

</body>
</html>
